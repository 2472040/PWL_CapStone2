services:
  db:
    image: mysql:8.0
    container_name: lokalab_db
    restart: always
    environment:
      MYSQL_DATABASE: lokalab_db
      MYSQL_USER: lokalab_user
      MYSQL_PASSWORD: lokalab_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    # MySQL 8.0 performance tuning
    # NOTE: --query-cache-type removed (query cache was removed in MySQL 8.0)
    command:
      - --innodb-buffer-pool-size=256M
      - --innodb-log-file-size=64M
      - --innodb-flush-log-at-trx-commit=2
      - --innodb-flush-method=O_DIRECT
      - --max-connections=200
      - --skip-name-resolve
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

  app:
    build:
      context: .
      target: development
    container_name: lokalab_app
    restart: always
    ports:
      - "3000:3000"
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - CORS_ORIGIN=http://localhost:5173
      - JWT_SECRET=lokalab-super-secure-jwt-secret-key-2026
      - JWT_REFRESH_SECRET=lokalab-super-secure-jwt-refresh-secret-2026
      - BACKUP_ENCRYPTION_SECRET=lokalab-super-secure-backup-secret-key-2026
      - AUDIT_LOG_SECRET=lokalab-super-secure-audit-secret-key-2026
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=lokalab_db
      - DB_USER=lokalab_user
      - DB_PASS=lokalab_password
      - VITE_API_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

volumes:
  db_data:
