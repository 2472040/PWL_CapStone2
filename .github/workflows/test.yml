name: Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check code style (Prettier)
        run: npm run format:check

      - name: Run code analysis (ESLint)
        run: npm run lint

  test:
    name: Run Tests (Node ${{ matrix.node-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: lokalab_db
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Seed Database
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASS: ""
          DB_NAME: lokalab_db
          JWT_SECRET: testing-secret-key-1234567890
          JWT_REFRESH_SECRET: testing-refresh-secret-12345
          BACKUP_ENCRYPTION_SECRET: testing-backup-secret-12345
          AUDIT_LOG_SECRET: testing-audit-secret-12345
        run: npm run seed

      - name: Run all tests (unit + integration)
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASS: ""
          DB_NAME: lokalab_db
          JWT_SECRET: testing-secret-key-1234567890
          JWT_REFRESH_SECRET: testing-refresh-secret-12345
          BACKUP_ENCRYPTION_SECRET: testing-backup-secret-12345
          AUDIT_LOG_SECRET: testing-audit-secret-12345
          PORT: 5000
          NODE_ENV: test
        run: npm test

      - name: Run frontend production build
        run: npm run build
