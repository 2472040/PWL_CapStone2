name: CI Pipeline

on:
  push:
    branches: [ main, master, development ]
  pull_request:
    branches: [ main, master, development ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: lokalab_db
          MYSQL_USER: lokalab_user
          MYSQL_PASSWORD: lokalab_password
          MYSQL_ROOT_PASSWORD: root_password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Check Code Formatting
        run: npm run format:check

      - name: Build Application
        run: npm run build
        env:
          JWT_SECRET: test_jwt_secret
          JWT_REFRESH_SECRET: test_jwt_refresh_secret
          BACKUP_ENCRYPTION_SECRET: test_backup_secret_secret_secret_12
          AUDIT_LOG_SECRET: test_audit_log_secret_secret_secret_123

      - name: Run Backend Integration & Unit Tests
        run: npm run test:backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: lokalab_user
          DB_PASS: lokalab_password
          DB_NAME: lokalab_db
          REDIS_URL: redis://127.0.0.1:6379
          JWT_SECRET: test_jwt_secret
          JWT_REFRESH_SECRET: test_jwt_refresh_secret
          BACKUP_ENCRYPTION_SECRET: test_backup_secret_secret_secret_12
          AUDIT_LOG_SECRET: test_audit_log_secret_secret_secret_123
          NODE_ENV: test

      - name: Run Frontend Tests
        run: npm run test:frontend
