# =============================================
# Production Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
# =============================================
services:
  db:
    # Override ports — don't expose MySQL in production
    ports: []

  redis:
    # Don't expose Redis port externally in production
    ports: []

  app:
    build:
      context: .
      target: production
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - BACKUP_ENCRYPTION_SECRET=${BACKUP_ENCRYPTION_SECRET}
      - AUDIT_LOG_SECRET=${AUDIT_LOG_SECRET}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=lokalab_db
      - DB_USER=lokalab_user
      - DB_PASS=${DB_PASS}
    # No bind mount in production — everything is baked into the image
    volumes: []
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
